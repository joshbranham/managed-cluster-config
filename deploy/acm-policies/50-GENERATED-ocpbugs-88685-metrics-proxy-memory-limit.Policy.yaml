---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
    annotations:
        policy.open-cluster-management.io/categories: CM Configuration Management
        policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
        policy.open-cluster-management.io/standards: NIST SP 800-53
    name: ocpbugs-88685-metrics-proxy-memory-limit
    namespace: openshift-acm-policies
spec:
    disabled: false
    policy-templates:
        - objectDefinition:
            apiVersion: policy.open-cluster-management.io/v1
            kind: ConfigurationPolicy
            metadata:
                name: ocpbugs-88685-metrics-proxy-memory-limit
            spec:
                evaluationInterval:
                    compliant: 2h
                    noncompliant: 45s
                object-templates-raw: |
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: v1
                        kind: ServiceAccount
                        metadata:
                          name: metrics-proxy-memory-limit
                          namespace: openshift-monitoring
                          labels:
                            app: metrics-proxy-memory-limit
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: ClusterRole
                        metadata:
                          name: metrics-proxy-memory-limit
                          labels:
                            app: metrics-proxy-memory-limit
                        rules:
                          - apiGroups: ["apps"]
                            resources: ["deployments"]
                            verbs: ["get", "list", "patch"]
                          - apiGroups: ["hypershift.openshift.io"]
                            resources: ["hostedcontrolplanes"]
                            verbs: ["get", "list"]
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: ClusterRoleBinding
                        metadata:
                          name: metrics-proxy-memory-limit
                          labels:
                            app: metrics-proxy-memory-limit
                        subjects:
                          - kind: ServiceAccount
                            name: metrics-proxy-memory-limit
                            namespace: openshift-monitoring
                        roleRef:
                          kind: ClusterRole
                          name: metrics-proxy-memory-limit
                          apiGroup: rbac.authorization.k8s.io
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: v1
                        kind: ConfigMap
                        metadata:
                          name: metrics-proxy-memory-limit-script
                          namespace: openshift-monitoring
                          labels:
                            app: metrics-proxy-memory-limit
                        data:
                          patch.sh: |
                            #!/bin/bash
                            set -uo pipefail

                            FIXED_MINOR=22
                            FIXED_PATCH=4
                            MEMORY_LIMIT="${MEMORY_LIMIT:-512Mi}"
                            added=0
                            removed=0
                            skipped=0
                            errors=0

                            for ns in $(oc get hostedcontrolplanes --all-namespaces --no-headers \
                              -o custom-columns=NS:.metadata.namespace 2>/dev/null); do

                              version=$(oc get hostedcontrolplane -n "$ns" \
                                -o jsonpath='{.items[0].status.versionStatus.desired.version}' 2>/dev/null)

                              if [ -z "$version" ]; then
                                echo "Skipping $ns (unable to determine HCP version)"
                                skipped=$((skipped + 1))
                                continue
                              fi

                              minor=$(echo "$version" | cut -d. -f2)
                              patch=$(echo "$version" | cut -d. -f3 | cut -d- -f1)

                              if [ "$minor" -lt "$FIXED_MINOR" ] 2>/dev/null; then
                                echo "Skipping $ns (version $version < 4.$FIXED_MINOR)"
                                skipped=$((skipped + 1))
                                continue
                              fi

                              if ! oc get deployment metrics-proxy -n "$ns" &>/dev/null; then
                                echo "Skipping $ns (no metrics-proxy deployment)"
                                skipped=$((skipped + 1))
                                continue
                              fi

                              names=$(oc get deployment metrics-proxy -n "$ns" \
                                -o jsonpath='{range .spec.template.spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null)
                              idx=-1
                              i=0
                              while IFS= read -r cname; do
                                if [ "$cname" = "metrics-proxy" ]; then
                                  idx=$i
                                  break
                                fi
                                i=$((i + 1))
                              done <<< "$names"

                              if [ "$idx" -eq -1 ]; then
                                echo "Skipping $ns (no metrics-proxy container found)"
                                skipped=$((skipped + 1))
                                continue
                              fi

                              current=$(oc get deployment metrics-proxy -n "$ns" \
                                -o jsonpath="{.spec.template.spec.containers[$idx].resources.limits.memory}" 2>/dev/null)

                              fixed=false
                              if [ "$minor" -gt "$FIXED_MINOR" ] 2>/dev/null; then
                                fixed=true
                              elif [ "$minor" -eq "$FIXED_MINOR" ] && [ "${patch:-0}" -ge "$FIXED_PATCH" ] 2>/dev/null; then
                                fixed=true
                              fi

                              if [ "$fixed" = "true" ]; then
                                if [ -n "$current" ]; then
                                  echo "Removing limit from metrics-proxy in $ns (version $version has the fix)"
                                  if oc patch deployment metrics-proxy -n "$ns" --type=json \
                                    -p='[{"op":"remove","path":"/spec/template/spec/containers/'"$idx"'/resources/limits"}]'; then
                                    removed=$((removed + 1))
                                  else
                                    echo "ERROR: Failed to remove limit in $ns"
                                    errors=$((errors + 1))
                                  fi
                                else
                                  echo "Skipping $ns (version $version, no limit to remove)"
                                  skipped=$((skipped + 1))
                                fi
                              else
                                if [ -z "$current" ]; then
                                  echo "Adding limit to metrics-proxy in $ns (version $version, container index $idx, setting memory limit to $MEMORY_LIMIT)"
                                  if oc patch deployment metrics-proxy -n "$ns" --type=json \
                                    -p='[{"op":"add","path":"/spec/template/spec/containers/'"$idx"'/resources/limits","value":{"memory":"'"$MEMORY_LIMIT"'"}}]'; then
                                    added=$((added + 1))
                                  else
                                    echo "ERROR: Failed to add limit in $ns"
                                    errors=$((errors + 1))
                                  fi
                                else
                                  echo "Skipping $ns (version $version, limit already set: $current)"
                                  skipped=$((skipped + 1))
                                fi
                              fi
                            done

                            echo "Done. Added: $added, Removed: $removed, Skipped: $skipped, Errors: $errors"
                            [ "$errors" -eq 0 ]
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: batch/v1
                        kind: CronJob
                        metadata:
                          name: metrics-proxy-memory-limit
                          namespace: openshift-monitoring
                          labels:
                            app: metrics-proxy-memory-limit
                          annotations:
                            kubernetes.io/description: "Mitigate OCPBUGS-88685 by adding memory limits to metrics-proxy deployments"
                        spec:
                          schedule: "*/30 * * * *"
                          concurrencyPolicy: Forbid
                          successfulJobsHistoryLimit: 3
                          failedJobsHistoryLimit: 3
                          jobTemplate:
                            spec:
                              backoffLimit: 1
                              activeDeadlineSeconds: 300
                              ttlSecondsAfterFinished: 3600
                              template:
                                metadata:
                                  labels:
                                    app: metrics-proxy-memory-limit
                                spec:
                                  serviceAccountName: metrics-proxy-memory-limit
                                  restartPolicy: Never
                                  affinity:
                                    nodeAffinity:
                                      preferredDuringSchedulingIgnoredDuringExecution:
                                        - preference:
                                            matchExpressions:
                                              - key: node-role.kubernetes.io/infra
                                                operator: Exists
                                          weight: 1
                                  tolerations:
                                    - operator: Exists
                                  containers:
                                    - name: patcher
                                      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
                                      imagePullPolicy: Always
                                      command:
                                        - /bin/bash
                                        - /scripts/patch.sh
                                      env:
                                        - name: MEMORY_LIMIT
                                          value: "512Mi"
                                      volumeMounts:
                                        - name: script
                                          mountPath: /scripts
                                          readOnly: true
                                      resources:
                                        requests:
                                          cpu: 10m
                                          memory: 64Mi
                                        limits:
                                          cpu: 100m
                                          memory: 128Mi
                                      securityContext:
                                        allowPrivilegeEscalation: false
                                        capabilities:
                                          drop:
                                            - ALL
                                        runAsNonRoot: true
                                        seccompProfile:
                                          type: RuntimeDefault
                                  volumes:
                                    - name: script
                                      configMap:
                                        name: metrics-proxy-memory-limit-script
                                        defaultMode: 0755
                pruneObjectBehavior: DeleteIfCreated
                remediationAction: enforce
                severity: high
    remediationAction: enforce
---
apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
    name: placement-ocpbugs-88685-metrics-proxy-memory-limit
    namespace: openshift-acm-policies
spec:
    clusterSelector:
        matchExpressions:
            - key: hypershift.open-cluster-management.io/management-cluster
              operator: In
              values:
                - "true"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
    name: binding-ocpbugs-88685-metrics-proxy-memory-limit
    namespace: openshift-acm-policies
placementRef:
    apiGroup: apps.open-cluster-management.io
    kind: PlacementRule
    name: placement-ocpbugs-88685-metrics-proxy-memory-limit
subjects:
    - apiGroup: policy.open-cluster-management.io
      kind: Policy
      name: ocpbugs-88685-metrics-proxy-memory-limit
